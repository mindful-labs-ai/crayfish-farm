<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crawfish Park</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 480px;
    height: 520px;
    overflow: hidden;
    background: #3d8828;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  #panel {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    border-radius: 14px;
    background: #3d8828;
    overflow: hidden;
  }

  /* Header — wooden barn header */
  #head {
    height: 42px;
    min-height: 42px;
    background: linear-gradient(180deg, #8b6240, #6e4b30);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    -webkit-app-region: drag;
    flex-shrink: 0;
  }

  .win-btn {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    -webkit-app-region: no-drag;
    flex-shrink: 0;
  }

  #btn-close { background: #ff5f57; }
  #btn-min   { background: #febc2e; }

  #head-title {
    flex: 1;
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    color: #faebd7;
    letter-spacing: 0.5px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }

  #head-sub {
    font-size: 10px;
    color: #d4b896;
  }

  /* Scene — bright farm daytime */
  #scene {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, #7ec8e3 0%, #a8dce8 35%, #c5e8a0 50%, #6db848 50%, #4a9a30 70%, #3d8828 100%);
  }

  /* Clouds */
  #scene::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60px 26px at 18% 18%, rgba(255,255,255,0.85) 0%, transparent 100%),
      radial-gradient(ellipse 44px 20px at 24% 16%, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(ellipse 70px 28px at 55% 10%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(ellipse 50px 22px at 62% 8%, rgba(255,255,255,0.85) 0%, transparent 100%),
      radial-gradient(ellipse 40px 18px at 82% 22%, rgba(255,255,255,0.75) 0%, transparent 100%);
    pointer-events: none;
    animation: cloudDrift 60s linear infinite;
  }

  @keyframes cloudDrift {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-30px); }
  }

  /* Sun */
  #scene::after {
    content: '';
    position: absolute;
    top: 18px;
    right: 40px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: radial-gradient(circle at 45% 45%, #fff8c0, #ffd740 50%, #f5a623);
    box-shadow: 0 0 24px 10px rgba(255, 215, 64, 0.35), 0 0 60px 20px rgba(255, 200, 50, 0.15);
    pointer-events: none;
  }

  /* Barn */
  .barn {
    position: absolute;
    left: 2%;
    bottom: calc(50% - 4px);
    width: 52px;
    height: 40px;
    background: linear-gradient(180deg, #c0392b 0%, #a93226 100%);
    border-radius: 2px;
    pointer-events: none;
    z-index: 2;
  }

  /* Barn roof */
  .barn::before {
    content: '';
    position: absolute;
    top: -18px;
    left: -6px;
    width: 0;
    height: 0;
    border-left: 32px solid transparent;
    border-right: 32px solid transparent;
    border-bottom: 20px solid #922b21;
  }

  /* Barn door */
  .barn::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 18px;
    height: 22px;
    background: #6b1a12;
    border-radius: 9px 9px 0 0;
  }

  /* Barn silo */
  .barn-silo {
    position: absolute;
    left: 50px;
    bottom: calc(50% - 4px);
    width: 18px;
    height: 50px;
    background: linear-gradient(180deg, #bbb 0%, #999 100%);
    border-radius: 4px 4px 0 0;
    pointer-events: none;
    z-index: 1;
  }

  .barn-silo::before {
    content: '';
    position: absolute;
    top: -6px;
    left: 2px;
    width: 14px;
    height: 8px;
    background: #aaa;
    border-radius: 50%;
  }

  /* Fence */
  .fence {
    position: absolute;
    bottom: 50%;
    height: 22px;
    display: flex;
    gap: 10px;
    pointer-events: none;
    z-index: 1;
  }

  .fence-left  { left: 60px; transform: translateY(50%); }
  .fence-right { right: 4px; transform: translateY(50%); }

  .fence-post {
    width: 4px;
    height: 22px;
    background: linear-gradient(180deg, #c9a96e, #a0855a);
    border-radius: 1px;
    position: relative;
  }

  .fence-post::before {
    content: '';
    position: absolute;
    top: 4px;
    left: -3px;
    width: 10px;
    height: 2px;
    background: #b89860;
    border-radius: 1px;
  }

  .fence-post::after {
    content: '';
    position: absolute;
    top: 12px;
    left: -3px;
    width: 10px;
    height: 2px;
    background: #b89860;
    border-radius: 1px;
  }

  /* Fence rails connecting posts */
  .fence-rail {
    position: absolute;
    bottom: 50%;
    height: 2px;
    background: #b89860;
    pointer-events: none;
    z-index: 1;
  }

  .fence-rail-left  { left: 62px; width: 54px; transform: translateY(-6px); }
  .fence-rail-right { right: 6px; width: 54px; transform: translateY(-6px); }

  .fence-rail::after {
    content: '';
    position: absolute;
    top: 8px;
    left: 0;
    right: 0;
    height: 2px;
    background: #b89860;
  }

  /* Ground — bright green pasture */
  .ground {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 50%;
    background: linear-gradient(180deg, #5aac36 0%, #4a9a2e 30%, #3e8a26 60%, #357820 100%);
    pointer-events: none;
  }

  /* Dirt path */
  .ground::before {
    content: '';
    position: absolute;
    top: 20%;
    left: -5%;
    right: -5%;
    height: 18px;
    background: linear-gradient(90deg, transparent 0%, rgba(160, 130, 80, 0.25) 30%, rgba(160, 130, 80, 0.3) 50%, rgba(160, 130, 80, 0.25) 70%, transparent 100%);
    border-radius: 50%;
    pointer-events: none;
  }

  /* Pond — blue water */
  .pond {
    position: absolute;
    bottom: 8%;
    right: 10%;
    width: 80px;
    height: 36px;
    border-radius: 50%;
    background: radial-gradient(ellipse at 40% 35%, #68b8e0, #3a90c4 60%, #2878a8);
    box-shadow: inset 0 -3px 6px rgba(0,0,0,0.12), 0 1px 0 rgba(255,255,255,0.2);
    animation: shimmer 4s ease-in-out infinite;
    pointer-events: none;
    z-index: 1;
  }

  /* Pond highlight */
  .pond::after {
    content: '';
    position: absolute;
    top: 8px;
    left: 18px;
    width: 24px;
    height: 8px;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
  }

  /* Grass blades along horizon */
  .grass {
    position: absolute;
    bottom: 50%;
    left: 0;
    right: 0;
    height: 16px;
    display: flex;
    pointer-events: none;
    z-index: 3;
  }

  .grass-1 { bottom: 50%; }
  .grass-2 { bottom: calc(50% + 2px); opacity: 0.7; transform: scaleX(0.85); }
  .grass-3 { bottom: calc(50% - 3px); opacity: 0.5; transform: scaleX(1.1); }

  .grass i {
    display: inline-block;
    width: 3px;
    margin: 0 1.5px;
    background: linear-gradient(to top, #4a9a30, #6cbd42);
    border-radius: 2px 2px 0 0;
    transform-origin: bottom center;
    animation: sway 3s ease-in-out infinite;
    font-style: normal;
  }

  /* Small flowers scattered on ground */
  .flowers {
    position: absolute;
    pointer-events: none;
    z-index: 1;
  }

  .flower {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .flower::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    width: 1px;
    height: 5px;
    background: #4a8a28;
    transform: translateX(-50%);
  }

  /* Crawfish area */
  #area {
    position: absolute;
    inset: 0;
  }

  /* Empty state */
  #empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    pointer-events: none;
  }

  #empty .empty-emoji {
    font-size: 36px;
    opacity: 0.4;
  }

  #empty .empty-text {
    font-size: 11px;
    color: #2d6418;
    text-align: center;
    line-height: 1.5;
    max-width: 220px;
    text-shadow: 0 1px 0 rgba(255,255,255,0.3);
  }

  /* Stats bar — wooden plank */
  #stats {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 32px;
    background: linear-gradient(180deg, #7a5530, #5e3f22);
    border-top: 2px solid #8b6240;
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 16px;
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .stat-icon {
    font-size: 12px;
  }

  .stat-val {
    font-size: 12px;
    font-weight: 700;
    color: #faebd7;
    text-shadow: 0 1px 1px rgba(0,0,0,0.3);
  }

  .stat-lbl {
    font-size: 10px;
    color: #d4b896;
  }

  /* Crawfish elements */
  .cx {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    cursor: pointer;
    transition: transform 0.15s;
  }

  .cx img {
    width: 40px;
    height: 40px;
    object-fit: contain;
    image-rendering: pixelated;
  }

  .cx .cx-name {
    font-size: 9px;
    font-weight: 600;
    color: #1a3a10;
    white-space: nowrap;
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: center;
    text-shadow: 0 1px 0 rgba(255,255,255,0.35);
  }

  .cx .cx-lvl {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.3px;
    text-shadow: 0 1px 0 rgba(255,255,255,0.3);
  }

  .cx .cx-tok {
    font-size: 8px;
    color: #2d5a18;
    text-shadow: 0 1px 0 rgba(255,255,255,0.2);
  }

  /* Level color classes — earthy farm palette */
  .c1 { color: #6a6a60; }
  .c2 { color: #1a8ab0; }
  .c3 { color: #2a8a18; }
  .c4 { color: #c88a10; }
  .c5 { color: #c0281a; }

  /* State animations via data-s attribute */
  .cx[data-s="working"] img { animation: bounce 0.8s ease-in-out infinite; }
  .cx[data-s="idle"]    img { animation: sway 3s ease-in-out infinite; }
  .cx[data-s="sleeping"] img { animation: breathe 4s ease-in-out infinite; }

  /* Sleeping zzz indicator */
  .cx[data-s="sleeping"]::after {
    content: 'z Z';
    position: absolute;
    top: -10px;
    right: -8px;
    font-size: 9px;
    color: #4a70a0;
    font-weight: 700;
    text-shadow: 0 1px 0 rgba(255,255,255,0.4);
    animation: zzz 3s ease-in-out infinite;
  }

  /* Level glow via data-l attribute */
  .cx[data-l="1"] img { filter: drop-shadow(0 0 3px #666); }
  .cx[data-l="2"] img { filter: drop-shadow(0 0 5px #00e5ff); }
  .cx[data-l="3"] img { filter: drop-shadow(0 0 7px #69ff47); }
  .cx[data-l="4"] img { filter: drop-shadow(0 0 9px #ffd740); }
  .cx[data-l="5"] img { filter: drop-shadow(0 0 12px #ff1744); }

  /* Animations */
  @keyframes sway {
    0%, 100% { transform: rotate(-4deg); }
    50%       { transform: rotate(4deg); }
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0) scaleY(1) rotate(-2deg); }
    30%       { transform: translateY(-6px) scaleY(1.05) rotate(2deg); }
    60%       { transform: translateY(-2px) scaleY(0.97) rotate(-1deg); }
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1);    opacity: 0.7; }
    50%       { transform: scale(1.04); opacity: 0.88; }
  }

  @keyframes zzz {
    0%   { transform: translateY(0);   opacity: 0; }
    20%  { transform: translateY(-4px); opacity: 1; }
    80%  { transform: translateY(-8px); opacity: 0.6; }
    100% { transform: translateY(-12px); opacity: 0; }
  }

  @keyframes shimmer {
    0%, 100% { opacity: 0.6; }
    50%       { opacity: 0.75; }
  }

  @keyframes dance {
    0%   { transform: translateY(0) rotate(0deg) scale(1); }
    10%  { transform: translateY(-8px) rotate(10deg) scale(1.05); }
    20%  { transform: translateY(0) rotate(-8deg) scale(1); }
    30%  { transform: translateY(-10px) rotate(12deg) scale(1.08); }
    40%  { transform: translateY(0) rotate(-10deg) scale(0.95); }
    50%  { transform: translateY(-12px) rotate(15deg) scale(1.1); }
    60%  { transform: translateY(-2px) rotate(-12deg) scale(1); }
    70%  { transform: translateY(-8px) rotate(8deg) scale(1.05); }
    80%  { transform: translateY(0) rotate(-5deg) scale(0.98); }
    90%  { transform: translateY(-4px) rotate(3deg) scale(1.02); }
    100% { transform: translateY(0) rotate(0deg) scale(1); }
  }

  /* Dance mode overrides all state animations */
  .cx.dancing img { animation: dance 0.6s ease-in-out infinite !important; opacity: 1 !important; }
  .cx.dancing::after { display: none !important; }

  /* Dance button */
  #btn-dance {
    width: 28px;
    height: 20px;
    border: none;
    border-radius: 4px;
    background: rgba(255,255,255,0.15);
    color: #faebd7;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    -webkit-app-region: no-drag;
    letter-spacing: 0.3px;
    transition: background 0.15s;
  }

  #btn-dance:hover { background: rgba(255,255,255,0.28); }
  #btn-dance.active { background: rgba(255,200,50,0.4); color: #fff; }

  .cx:hover { transform: scale(1.12); z-index: 10; }
  .cx.selected { z-index: 20; transform: scale(1.15); }

  /* Info card — bottom panel */
  #info-card {
    position: absolute;
    bottom: 32px;
    left: 12px;
    right: 12px;
    z-index: 40;
    background: #faf5e8;
    border-radius: 14px;
    box-shadow: 0 -2px 16px rgba(0,0,0,0.25);
    padding: 14px 16px 12px;
    display: none;
    animation: cardSlideUp 0.2s ease-out;
  }

  #info-card.show { display: block; }

  @keyframes cardSlideUp {
    0%   { opacity: 0; transform: translateY(12px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Top row: sprite + name/state + level + close */
  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
  }

  .card-sprite {
    width: 52px;
    height: 52px;
    object-fit: contain;
    image-rendering: pixelated;
    flex-shrink: 0;
  }

  .card-info { flex: 1; min-width: 0; }

  .card-name {
    font-size: 16px;
    font-weight: 700;
    color: #2a1e10;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-state {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 5px;
    margin-top: 3px;
  }

  .card-state.working  { background: #d4edbc; color: #3a6a18; }
  .card-state.idle     { background: #f5e8c0; color: #c08a10; }
  .card-state.sleeping { background: #d0dae8; color: #506080; }

  .card-level {
    font-size: 13px;
    font-weight: 700;
    color: #8a6a40;
    text-align: right;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .card-close {
    width: 24px;
    height: 24px;
    border: 1px solid #d0c4a8;
    border-radius: 50%;
    background: transparent;
    color: #8a7a60;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    line-height: 1;
    transition: background 0.15s;
  }

  .card-close:hover { background: #eee4d0; }

  /* Summary text area */
  .card-body {
    background: #f2ece0;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    line-height: 1.55;
    color: #3a3020;
    word-break: break-word;
    max-height: 80px;
    overflow-y: auto;
    border-left: 3px solid #d4c8a8;
  }

  .card-body::-webkit-scrollbar { width: 3px; }
  .card-body::-webkit-scrollbar-thumb { background: #c8b890; border-radius: 2px; }

  .card-body:empty::after {
    content: '...';
    color: #b0a080;
    font-style: italic;
  }

  /* Feed count */
  .card-footer {
    text-align: right;
    margin-top: 6px;
    font-size: 11px;
    color: #a09070;
    font-weight: 600;
  }
</style>
</head>
<body>
<div id="panel">
  <!-- Header -->
  <div id="head">
    <button class="win-btn" id="btn-close" title="Quit"></button>
    <button class="win-btn" id="btn-min" title="Hide"></button>
    <div id="head-title">🦞 Crayfish Farm</div>
    <span id="head-sub"></span>
    <button id="btn-dance" title="Dance!">d</button>
  </div>

  <!-- Scene -->
  <div id="scene">
    <!-- Barn -->
    <div class="barn"></div>
    <div class="barn-silo"></div>

    <!-- Fences -->
    <div class="fence fence-right">
      <div class="fence-post"></div>
      <div class="fence-post"></div>
      <div class="fence-post"></div>
      <div class="fence-post"></div>
      <div class="fence-post"></div>
      <div class="fence-post"></div>
    </div>

    <!-- Ground -->
    <div class="ground"></div>

    <!-- Pond -->
    <div class="pond"></div>

    <!-- Flowers -->
    <div id="flower-container"></div>

    <!-- Grass strips (generated by JS) -->
    <div class="grass grass-1" id="grass-1"></div>
    <div class="grass grass-2" id="grass-2"></div>
    <div class="grass grass-3" id="grass-3"></div>

    <!-- Crawfish area -->
    <div id="area"></div>

    <!-- Empty state -->
    <div id="empty">
      <div class="empty-emoji">🦞</div>
      <div class="empty-text">Claude Code 세션을 시작하면<br>가재가 나타납니다</div>
    </div>

    <!-- Info card -->
    <div id="info-card">
      <div class="card-header">
        <img class="card-sprite" id="card-sprite" src="" alt="">
        <div class="card-info">
          <div class="card-name" id="card-name"></div>
          <div class="card-state" id="card-state"></div>
        </div>
        <div class="card-level" id="card-level"></div>
        <button class="card-close" id="card-close">&times;</button>
      </div>
      <div class="card-body" id="card-body"></div>
      <div class="card-footer" id="card-footer"></div>
    </div>

    <!-- Stats bar -->
    <div id="stats">
      <div class="stat-item">
        <span class="stat-icon">🦞</span>
        <span class="stat-val" id="stat-sessions">0</span>
        <span class="stat-lbl">crayfish</span>
      </div>
      <div class="stat-item">
        <span class="stat-icon">🌾</span>
        <span class="stat-lbl">Active</span>
        <span class="stat-val" id="stat-active">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-icon">🪣</span>
        <span class="stat-lbl">Feed</span>
        <span class="stat-val" id="stat-tokens">0</span>
      </div>
    </div>
  </div>
</div>

<script>
  // Constants
  const LVL = ['', 'baby', 'juvenile', 'adult', 'warrior', 'king'];
  const LNAME = ['', 'Baby', 'Juvenile', 'Adult', 'Warrior', 'King'];
  const POS = [
    { left: '14%', bottom: '22%' },
    { left: '54%', bottom: '26%' },
    { left: '34%', bottom: '16%' },
    { left: '72%', bottom: '20%' },
    { left: '22%', bottom: '32%' },
    { left: '46%', bottom: '12%' },
    { left: '8%',  bottom: '38%' },
    { left: '80%', bottom: '30%' },
  ];

  // State
  let sprites = {};
  let allAgents = [];
  let selectedSid = null;

  // Generate grass blades
  function generateGrass() {
    for (let g = 1; g <= 3; g++) {
      const el = document.getElementById('grass-' + g);
      if (!el) continue;
      for (let i = 0; i < 26; i++) {
        const blade = document.createElement('i');
        const delay = (Math.random() * 3).toFixed(2);
        const height = (8 + Math.random() * 8).toFixed(1);
        blade.style.height = height + 'px';
        blade.style.animationDelay = delay + 's';
        el.appendChild(blade);
      }
    }
  }

  // Token formatter
  function fmt(n) {
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
    if (n >= 1_000)     return (n / 1_000).toFixed(1) + 'K';
    return String(n);
  }

  // Sprite key
  function sk(a) {
    const lvlName = LVL[a.level] || 'baby';
    const state = a.state === 'working' ? 'working'
                : a.state === 'idle'    ? 'idle'
                : 'sleeping';
    return lvlName + '_' + state;
  }

  // Render function
  function render(agents) {
    const area = document.getElementById('area');
    const empty = document.getElementById('empty');

    if (!agents || agents.length === 0) {
      area.innerHTML = '';
      empty.style.display = 'flex';
      document.getElementById('stat-sessions').textContent = '0';
      document.getElementById('stat-active').textContent = '0';
      document.getElementById('stat-tokens').textContent = '0';
      return;
    }

    empty.style.display = 'none';

    // Sort: working first, then by level descending
    const sorted = [...agents].sort((a, b) => {
      if (a.state === 'working' && b.state !== 'working') return -1;
      if (b.state === 'working' && a.state !== 'working') return 1;
      return b.level - a.level;
    });

    // Track existing elements by sessionId
    const existing = new Map();
    area.querySelectorAll('.cx').forEach(el => {
      existing.set(el.dataset.sid, el);
    });

    const seen = new Set();

    sorted.forEach((agent, i) => {
      seen.add(agent.sessionId);
      const pos = POS[i % POS.length];

      let el = existing.get(agent.sessionId);
      if (!el) {
        // Create new element
        el = document.createElement('div');
        el.className = 'cx';
        el.dataset.sid = agent.sessionId;

        const img = document.createElement('img');
        img.alt = '';
        el.appendChild(img);

        const name = document.createElement('div');
        name.className = 'cx-name';
        el.appendChild(name);

        const lvlEl = document.createElement('div');
        lvlEl.className = 'cx-lvl';
        el.appendChild(lvlEl);

        const tok = document.createElement('div');
        tok.className = 'cx-tok';
        el.appendChild(tok);

        area.appendChild(el);
      }

      // Update position
      el.style.left = pos.left;
      el.style.bottom = pos.bottom;

      // Update state + level attributes for CSS
      el.dataset.s = agent.state;
      el.dataset.l = String(agent.level);

      // z-index: working agents always in front
      el.style.zIndex = agent.state === 'working' ? '8' : agent.state === 'idle' ? '6' : '4';

      // Update sprite image
      const imgEl = el.querySelector('img');
      const key = sk(agent);
      if (sprites[key]) {
        imgEl.src = sprites[key];
      } else {
        imgEl.src = '';
      }

      // Update name
      el.querySelector('.cx-name').textContent = agent.projectName || agent.sessionId.slice(0, 8);

      // Update level text with color class
      const lvlEl = el.querySelector('.cx-lvl');
      lvlEl.textContent = LNAME[agent.level] || 'Baby';
      lvlEl.className = 'cx-lvl c' + (agent.level || 1);

      // Update token count
      el.querySelector('.cx-tok').textContent = fmt(agent.rawTokenUsage || 0) + ' feed';

      // Click handler — show speech bubble
      el.onclick = (e) => { e.stopPropagation(); showBubble(agent, el); };
    });

    // Remove stale elements
    existing.forEach((el, sid) => {
      if (!seen.has(sid)) {
        el.remove();
      }
    });

    // Update stats bar
    const active = agents.filter(a => a.state === 'working').length;
    const totalRaw = agents.reduce((s, a) => s + (a.rawTokenUsage || 0), 0);
    document.getElementById('stat-sessions').textContent = String(agents.length);
    document.getElementById('stat-active').textContent = String(active);
    document.getElementById('stat-tokens').textContent = fmt(totalRaw);

    // Update header subtitle
    const sub = document.getElementById('head-sub');
    if (sub) {
      const feeding = agents.filter(a => a.state === 'working').length;
      sub.textContent = agents.length + ' crayfish · ' + feeding + ' feeding';
    }
  }

  // Farm-themed state descriptions
  function farmState(s) {
    if (s === 'working') return { emoji: '🔨', label: 'feeding', text: '열심히 먹이 먹는 중' };
    if (s === 'idle')    return { emoji: '🌾', label: 'resting', text: '풀밭에서 쉬는 중' };
    return                       { emoji: '💤', label: 'sleeping', text: '깊이 잠든 중' };
  }

  // Time ago formatter
  function timeAgo(ts) {
    if (!ts) return '—';
    const sec = Math.floor((Date.now() - ts) / 1000);
    if (sec < 60) return 'just now';
    const min = Math.floor(sec / 60);
    if (min < 60) return min + 'm ago';
    const hr = Math.floor(min / 60);
    if (hr < 24) return hr + 'h ' + (min % 60) + 'm ago';
    return Math.floor(hr / 24) + 'd ago';
  }

  // Summarize exchange for the bubble — short, human-friendly
  function summarize(text, state) {
    if (!text || !text.trim()) {
      const fs = farmState(state);
      return fs.text;
    }
    let s = text.replace(/```[\s\S]*?```/g, '');
    s = s.replace(/\|[^\n]+\|/g, '');
    s = s.replace(/^#{1,6}\s+/gm, '');
    s = s.replace(/\*\*/g, '').replace(/`/g, '');
    // Get first meaningful line
    const lines = s.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    s = lines.slice(0, 3).join(' ');
    s = s.trim();
    if (s.length > 150) s = s.slice(0, 147) + '…';
    return s || farmState(state).text;
  }

  // Show info card for a crawfish
  function showBubble(agent, cxEl) {
    if (!agent || !cxEl) return;

    // Toggle off if same
    if (selectedSid === agent.sessionId) {
      hideBubble();
      return;
    }

    hideBubble();
    selectedSid = agent.sessionId;
    cxEl.classList.add('selected');

    const fs = farmState(agent.state);
    const card = document.getElementById('info-card');

    // Sprite
    const key = sk(agent);
    document.getElementById('card-sprite').src = sprites[key] || '';

    // Name
    document.getElementById('card-name').textContent = agent.projectName || agent.sessionId.slice(0, 12);

    // State badge
    const stateEl = document.getElementById('card-state');
    stateEl.textContent = fs.label.charAt(0).toUpperCase() + fs.label.slice(1);
    stateEl.className = 'card-state ' + agent.state;

    // Level
    document.getElementById('card-level').textContent = 'Lv' + agent.level + ' ' + (LNAME[agent.level] || '');

    // Body text
    document.getElementById('card-body').textContent = summarize(agent.lastExchange, agent.state);

    // Feed
    document.getElementById('card-footer').textContent = 'Feed: ' + fmt(agent.rawTokenUsage || 0);

    card.classList.add('show');
  }

  // Hide card
  function hideBubble() {
    selectedSid = null;
    document.getElementById('info-card').classList.remove('show');
    document.querySelectorAll('.cx.selected').forEach(el => el.classList.remove('selected'));
  }

  // Refresh card if still open
  function refreshBubble() {
    if (!selectedSid) return;
    const agent = allAgents.find(a => a.sessionId === selectedSid);
    const cxEl = document.querySelector('.cx[data-sid="' + selectedSid + '"]');
    if (agent && cxEl) {
      // Update content without re-triggering animation
      const fs = farmState(agent.state);
      const key = sk(agent);
      document.getElementById('card-sprite').src = sprites[key] || '';
      document.getElementById('card-body').textContent = summarize(agent.lastExchange, agent.state);
      document.getElementById('card-footer').textContent = 'Feed: ' + fmt(agent.rawTokenUsage || 0);
      const stateEl = document.getElementById('card-state');
      stateEl.textContent = fs.label.charAt(0).toUpperCase() + fs.label.slice(1);
      stateEl.className = 'card-state ' + agent.state;
    } else {
      hideBubble();
    }
  }

  // Generate scattered flowers on the ground
  function generateFlowers() {
    const container = document.getElementById('flower-container');
    if (!container) return;
    const colors = ['#f5e642', '#e8a0d0', '#ff8888', '#ffcc44', '#ffffff'];
    for (let i = 0; i < 12; i++) {
      const f = document.createElement('div');
      f.className = 'flower';
      f.style.left = (8 + Math.random() * 80) + '%';
      f.style.bottom = (4 + Math.random() * 36) + '%';
      f.style.background = colors[Math.floor(Math.random() * colors.length)];
      f.style.opacity = (0.5 + Math.random() * 0.4).toFixed(2);
      container.appendChild(f);
    }
    container.className = 'flowers';
    container.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:1;';
  }

  // Init
  generateGrass();
  generateFlowers();

  // Event listeners
  document.getElementById('btn-close').addEventListener('click', () => window.api.quit());
  document.getElementById('btn-min').addEventListener('click', () => window.api.hide());

  // Dance mode
  let danceTimer = null;
  document.getElementById('btn-dance').addEventListener('click', () => {
    if (danceTimer) return; // already dancing
    const btn = document.getElementById('btn-dance');
    btn.classList.add('active');
    // Add dancing class to all crawfish
    document.querySelectorAll('.cx').forEach(el => el.classList.add('dancing'));
    // Stop after 3 seconds
    danceTimer = setTimeout(() => {
      document.querySelectorAll('.cx').forEach(el => el.classList.remove('dancing'));
      btn.classList.remove('active');
      danceTimer = null;
    }, 3000);
  });

  // Close button
  document.getElementById('card-close').addEventListener('click', () => hideBubble());

  // Click anywhere on scene to dismiss card
  document.getElementById('scene').addEventListener('click', (e) => {
    if (selectedSid && !e.target.closest('.cx') && !e.target.closest('#info-card')) {
      hideBubble();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (selectedSid) hideBubble();
      else window.api.hide();
    }
    if (e.key === 'd' || e.key === 'D') {
      document.getElementById('btn-dance').click();
    }
  });

  // Listen for updates from main process
  window.api.onUpdate((data) => {
    if (data.sprites) {
      sprites = data.sprites;
    }
    if (data.agents !== undefined) {
      allAgents = data.agents;
      render(data.agents);
      refreshBubble();
    }
  });
</script>
</body>
</html>
